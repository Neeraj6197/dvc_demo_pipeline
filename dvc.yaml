# updated dvc.yaml

stages:
  data_ingestion:
    cmd: python src/data_processing/data_ingestion.py
    deps:
    - src/data_processing/data_ingestion.py
    params:
    - data_ingestion.test_size
    outs:
    - data/raw

  data_preprocessing:
    cmd: python src/data_processing/data_preprocessing.py
    deps:
    - data/raw
    - src/data_processing/data_preprocessing.py
    outs:
    - data/processed

  model_building:
    cmd: python src/model/model_building.py
    deps:
    - data/processed
    - src/model/model_building.py
    outs:
    - models/education_loan_model.pkl

  model_evaluation:
    cmd: python src/model/model_evaluation.py
    deps:
    - models/education_loan_model.pkl
    - src/model/model_evaluation.py
    metrics:
    - reports/metrics.json
    outs:
    - reports/experiment_info.json  # Add the model_info.json file as an output

  model_registration:
    cmd: python src/model/register_model.py
    deps:
    - reports/experiment_info.json
    - src/model/register_model.py